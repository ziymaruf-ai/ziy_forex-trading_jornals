<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIYAD FOREX TRADING JOURNAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d0e12; color: #c5c6c7; font-family: sans-serif; }
        .card { background-color: #16171d; border: 1px solid #20222b; }
        .input-field { background-color: #0d0e12; border: 1px solid #45a29e; color: #ffffff; padding: 10px; width: 100%; border-radius: 6px; }
        .table-hdr { background-color: #1c1d25; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="mb-8 border-b border-gray-800 pb-4">
        <h1 class="text-2xl font-black text-white"><i class="fa-solid fa-chart-line text-cyan-400"></i> ZIYAD FOREX TRADING JOURNAL</h1>
    </header>

    <!-- Financial Gateway -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div class="card p-6 rounded-xl border border-gray-800">
            <h2 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-wallet text-sky-400"></i> Account Summary</h2>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div><p class="text-[10px] text-gray-500 uppercase font-bold">Deposits</p><div id="statTotalDeposits" class="text-xl font-black text-emerald-500">$0.00</div></div>
                <div><p class="text-[10px] text-gray-500 uppercase font-bold">Withdrawals</p><div id="statTotalWithdrawals" class="text-xl font-black text-rose-500">$0.00</div></div>
            </div>
            <div class="pt-4 border-t border-gray-800">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Current Net Balance</p>
                <div id="statCurrentBalance" class="text-3xl font-black text-white">$5,000.00</div>
            </div>
        </div>

        <div class="card p-6 rounded-xl border border-gray-800">
            <h2 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-exchange-alt text-amber-400"></i> Transaction Engine</h2>
            <input type="number" id="transAmount" placeholder="Enter Amount (USD)" class="input-field mb-3">
            <div class="grid grid-cols-2 gap-2 mb-4">
                <button onclick="processTransaction('deposit')" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 rounded">Deposit</button>
                <button onclick="processTransaction('withdraw')" class="bg-rose-600 hover:bg-rose-500 text-white font-bold py-2 rounded">Withdraw</button>
            </div>
            <button onclick="resetData()" class="text-xs text-gray-600 uppercase font-bold hover:text-rose-500">Reset All Data</button>
        </div>
    </div>

    <!-- Trade History -->
    <div class="card rounded-lg overflow-hidden">
        <div class="p-4 border-b border-gray-800"><h3 class="font-bold text-white uppercase">History</h3></div>
        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm">
                <thead><tr class="table-hdr text-gray-400"><th class="p-3">Type</th><th class="p-3">Amount</th></tr></thead>
                <tbody id="historyLog" class="text-gray-300"></tbody>
            </table>
        </div>
    </div>

    <script>
        let deposits = parseFloat(localStorage.getItem('journal_deposits')) || 0;
        let withdraws = parseFloat(localStorage.getItem('journal_withdrawals')) || 0;
        let history = JSON.parse(localStorage.getItem('journal_history')) || [];
        const baseCapital = 5000;

        function processTransaction(type) {
            const amountInput = document.getElementById('transAmount');
            const amount = parseFloat(amountInput.value);
            if(isNaN(amount) || amount <= 0) return alert("እባክዎ ትክክለኛ መጠን ያስገቡ");

            if(type === 'deposit') { deposits += amount; } 
            else { withdraws += amount; }
            
            history.push({type, amount, date: new Date().toLocaleDateString()});
            localStorage.setItem('journal_deposits', deposits);
            localStorage.setItem('journal_withdrawals', withdraws);
            localStorage.setItem('journal_history', JSON.stringify(history));
            
            amountInput.value = "";
            updateUI();
        }

        function updateUI() {
            document.getElementById('statTotalDeposits').innerText = '$' + deposits.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('statTotalWithdrawals').innerText = '$' + withdraws.toLocaleString(undefined, {minimumFractionDigits: 2});
            let balance = baseCapital + deposits - withdraws;
            document.getElementById('statCurrentBalance').innerText = '$' + balance.toLocaleString(undefined, {minimumFractionDigits: 2});
            
            document.getElementById('historyLog').innerHTML = history.map(h => `
                <tr class="border-b border-gray-800">
                    <td class="p-3 capitalize">${h.type}</td>
                    <td class="p-3">$${h.amount.toLocaleString()}</td>
                </tr>
            `).join('');
        }

        function resetData() {
            if(confirm("መረጃውን በሙሉ ማጥፋት ይፈልጋሉ?")) {
                localStorage.clear();
                location.reload();
            }
        }

        updateUI();
    </script>
</body>
</html>
