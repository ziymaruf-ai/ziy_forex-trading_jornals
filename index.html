<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIYAD FOREX TRADING JOURNAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d0e12; color: #c5c6c7; font-family: sans-serif; }
        .card { background-color: #16171d; border: 1px solid #20222b; }
        .input-field { background-color: #0d0e12; border: 1px solid #45a29e; color: #ffffff; padding: 8px; width: 100%; border-radius: 6px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="mb-8 border-b border-gray-800 pb-4">
        <h1 class="text-2xl font-black text-white"><i class="fa-solid fa-chart-line text-cyan-400"></i> ZIYAD FOREX TRADING JOURNAL</h1>
    </header>

    <!-- Account Summary -->
    <div class="card p-6 rounded-xl mb-8">
        <h2 class="text-lg font-bold text-white mb-4">Account Overview</h2>
        <div id="statCurrentBalance" class="text-4xl font-black text-white">$0.00</div>
    </div>

    <!-- Backtesting Form -->
    <div class="card p-6 rounded-xl mb-8">
        <h2 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-pen-nib text-cyan-400"></i> Add New Trade</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <input type="text" id="pair" placeholder="Pair (e.g. XAUUSD)" class="input-field">
            <select id="type" class="input-field"><option>Buy</option><option>Sell</option></select>
            <input type="number" id="risk" placeholder="Risk Amount ($)" class="input-field">
            <input type="number" id="rr" placeholder="RR Ratio" class="input-field">
            <select id="outcome" class="input-field"><option>Win</option><option>Loss</option></select>
            <button onclick="addTrade()" class="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 rounded">Save Trade</button>
        </div>
    </div>

    <!-- Trade History Table -->
    <div class="card rounded-xl overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-gray-800 text-gray-400 text-xs uppercase">
                <tr><th class="p-3">Pair</th><th class="p-3">Type</th><th class="p-3">Risk</th><th class="p-3">RR</th><th class="p-3">Outcome</th></tr>
            </thead>
            <tbody id="tradeLog" class="text-gray-300"></tbody>
        </table>
    </div>

    <script>
        let trades = JSON.parse(localStorage.getItem('ziyad_trades')) || [];

        function addTrade() {
            const trade = {
                pair: document.getElementById('pair').value,
                type: document.getElementById('type').value,
                risk: document.getElementById('risk').value,
                rr: document.getElementById('rr').value,
                outcome: document.getElementById('outcome').value
            };
            
            if(!trade.pair) return alert("እባክዎ Pair ያስገቡ");
            
            trades.push(trade);
            localStorage.setItem('ziyad_trades', JSON.stringify(trades));
            renderTrades();
        }

        function renderTrades() {
            const log = document.getElementById('tradeLog');
            log.innerHTML = trades.map(t => `
                <tr class="border-b border-gray-800">
                    <td class="p-3 font-bold">${t.pair}</td>
                    <td class="p-3 ${t.type === 'Buy' ? 'text-emerald-500' : 'text-rose-500'}">${t.type}</td>
                    <td class="p-3">$${t.risk}</td>
                    <td class="p-3">${t.rr}</td>
                    <td class="p-3"><span class="${t.outcome === 'Win' ? 'text-emerald-500' : 'text-rose-500'} font-black">${t.outcome}</span></td>
                </tr>
            `).join('');
        }

        renderTrades();
    </script>
</body>
</html>
